<!--
  Wazuh Agent Configuration — ossec.conf
  Machine: Win10-Client (Windows 10 Victim Endpoint)
  Wazuh Version: v4.7.5

  NOTE: All IP addresses have been replaced with placeholders.
  Replace <WAZUH_SERVER_IP> with your actual Wazuh manager IP before use.
-->

<ossec_config>

  <!-- ══════════════════════════════════════════════
       MANAGER CONNECTION
       Connects this agent to the Wazuh manager
  ══════════════════════════════════════════════ -->
  <client>
    <server>
      <address>WAZUH_SERVER_IP_REDACTED</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>windows, windows10</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <!-- ══════════════════════════════════════════════
       BUFFER / ANTI-FLOODING SETTINGS
  ══════════════════════════════════════════════ -->
  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <!-- ══════════════════════════════════════════════
       WINDOWS EVENT LOG MONITORING
       Captures Security, System, and Application logs
  ══════════════════════════════════════════════ -->
  <localfile>
    <location>Security</location>
    <log_format>eventchannel</log_format>
    <query>Event/System[EventID != 5145 and EventID != 5156 and EventID != 5447]</query>
  </localfile>

  <localfile>
    <location>System</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Application</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ══════════════════════════════════════════════
       POWERSHELL SCRIPT BLOCK LOGGING
       Captures Event ID 4104 — PowerShell execution
  ══════════════════════════════════════════════ -->
  <localfile>
    <location>Microsoft-Windows-PowerShell/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ══════════════════════════════════════════════
       WINDOWS DEFENDER EVENTS
       Captures malware detection, disabled protection
  ══════════════════════════════════════════════ -->
  <localfile>
    <location>Microsoft-Windows-Windows Defender/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ══════════════════════════════════════════════
       FILE INTEGRITY MONITORING (FIM)
       Monitors critical Windows directories for changes
  ══════════════════════════════════════════════ -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>

    <!-- Monitor Windows system directories -->
    <directories check_all="yes">%WINDIR%/System32</directories>
    <directories check_all="yes">%WINDIR%/SysWOW64</directories>
    <directories check_all="yes">%PROGRAMDATA%/Microsoft/Windows/Start Menu/Programs/Startup</directories>

    <!-- Ignore noisy temp files -->
    <ignore>%WINDIR%/System32/LogFiles</ignore>
    <ignore>%WINDIR%/System32/wbem</ignore>
  </syscheck>

  <!-- ══════════════════════════════════════════════
       ROOTKIT / ANOMALY DETECTION
  ══════════════════════════════════════════════ -->
  <rootcheck>
    <disabled>no</disabled>
    <windows_apps>./shared/win_applications_rcl.txt</windows_apps>
    <windows_malware>./shared/win_malware_rcl.txt</windows_malware>
  </rootcheck>

  <!-- ══════════════════════════════════════════════
       ACTIVE RESPONSE
       Allows manager to send response commands to agent
  ══════════════════════════════════════════════ -->
  <active-response>
    <disabled>no</disabled>
    <ca_store>wpk_root.pem</ca_store>
    <ca_verification>yes</ca_verification>
  </active-response>

  <!-- ══════════════════════════════════════════════
       AGENT LOGGING
  ══════════════════════════════════════════════ -->
  <logging>
    <log_format>plain</log_format>
  </logging>

</ossec_config>
